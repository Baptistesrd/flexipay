<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flexipay - Live Demo</title>
    <meta
      name="description"
      content="Flexipay live demo: embedded BNPL widget with 2x 50/50 checkout flow."
    />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #52525b;
        --line: #e4e4e7;
        --soft: #f4f4f5;
        --shadow: 0 1px 1px rgba(0, 0, 0, 0.04), 0 12px 40px rgba(0, 0, 0, 0.08);
        --radius: 20px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--fg);
        background:
          radial-gradient(1200px 500px at 50% -120px, #e5e7eb 0%, transparent 60%),
          radial-gradient(700px 500px at 100% 100%, #f4f4f5 0%, transparent 55%),
          var(--bg);
      }

      a { color: inherit; text-underline-offset: 3px; }

      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px 18px 56px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 22px;
      }

      .brand { display: flex; align-items: center; gap: 10px; }
      .logo { width: 36px; height: 36px; border-radius: 14px; background: #000; }

      .brand h1 {
        font-size: 14px;
        margin: 0;
        letter-spacing: -0.01em;
      }

      .brand p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions { display: flex; align-items: center; gap: 10px; }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(8px);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease;
      }

      .btn:hover { transform: translateY(-1px); border-color: #d4d4d8; }
      .btn.primary { background: #000; color: #fff; border-color: #000; }
      .btn.primary:hover { background: #111; border-color: #111; }

      .hero {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 16px;
        align-items: start;
      }

      @media (max-width: 920px) {
        .hero { grid-template-columns: 1fr; }
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .inner { padding: 18px; }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }

      .dot { width: 7px; height: 7px; border-radius: 99px; background: #111; }

      .headline {
        margin: 12px 0 6px;
        font-size: 34px;
        line-height: 1.06;
        letter-spacing: -0.03em;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
        max-width: 60ch;
      }

      .grid2 {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      @media (max-width: 520px) {
        .grid2 { grid-template-columns: 1fr; }
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.7);
      }

      .pill .t { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
      .pill .v { font-size: 13px; font-weight: 700; margin: 0; }

      .sectionTitle {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        padding: 12px;
      }

      .product {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .thumb {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        border: 1px solid var(--line);
        object-fit: cover;
        background: #fff;
      }

      .pname { margin: 0; font-weight: 700; font-size: 14px; }
      .psub { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
      .price { margin-left: auto; font-weight: 800; }

      .footer {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      @media (max-width: 640px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .wrap {
    padding: 16px 12px 32px;
  }

  .headline {
    font-size: 26px;
  }

  .panel {
    padding: 10px;
  }

  .thumb {
    width: 52px;
    height: 52px;
  }

  button,
  .btn {
    width: 100%;
  }
}

    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- Topbar -->
      <div class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>Flexipay</h1>
            <p>Live Demo</p>
          </div>
        </div>

        <div class="actions">
          <a class="btn" href="/admin/index.html">Merchant reporting</a>
        </div>
      </div>


        <!-- Right: Checkout -->
        <div class="card" id="checkout">
          <div class="inner">
            <div class="sectionTitle">Checkout preview</div>

            <div class="panel">
              <div class="product">
                <img src="/sneaky.png" alt="Sneakers" class="thumb" />
                <div>
                  <p class="pname">Sneakers</p>
                  <p class="psub">Premium edition • Size 42</p>
                </div>
                <div class="price">€129.90</div>
              </div>

              <div style="margin-top: 12px;">
                <div
                  class="bnpl-widget"
                  data-amount="129.90"
                  data-currency="EUR"
                  data-merchant="merchant_demo"
                ></div>
              </div>

              <div class="footer">
                <span>Secure payments • Powered by Flexipay</span>
                <a href="/admin/index.html">View transactions →</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Widget script -->
    <script src="/bnpl.js"></script>

    <!-- Mount widget -->
    <script>
      BNPL.mount(".bnpl-widget");
    </script>
  </body>
</html>
