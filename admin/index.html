<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BNPL Admin</title>
  </head>
  <body style="max-width:960px;margin:40px auto;font-family:system-ui;">
    <h1>Reporting — merchant_demo</h1>
    <button id="refresh">Rafraîchir</button>
    <pre id="out" style="background:#f6f6f6;padding:12px;border-radius:10px;overflow:auto;"></pre>

    <script>
      const apiBase = "http://localhost:4242";
      const merchantId = "merchant_demo";

      async function load() {
        const r = await fetch(`${apiBase}/v1/merchants/${merchantId}/transactions`);
        const json = await r.json();
        document.getElementById("out").textContent = JSON.stringify(json, null, 2);
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
